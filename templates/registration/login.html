{% extends 'shop/base.html' %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card card card-body mx-auto">
        <h3 class="mb-2 text-center">Welcome Back</h3>
        <p class="text-center text-muted">Login with username, email, or phone number.</p>
        <div class="d-flex justify-content-center mb-3">
            <a class="btn btn-primary btn-sm" href="{% url 'login' %}">Login</a>
            <a class="btn btn-outline-primary btn-sm ms-2" href="{% url 'signup' %}">Quick Switch: Signup</a>
        </div>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-gradient w-100">Login Now</button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>
{% endblock %}
