{% extends 'shop/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-body">
            <h3 class="mb-3">Admin / Staff Login</h3>
            <p class="text-muted">Only staff users can access admin from here.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-warning">Login as Staff</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
